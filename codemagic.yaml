workflows:
  ios-build:
    name: iOS Build for SideStore
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: 获取依赖
        script: |
          flutter pub get
      - name: 安装 iOS 依赖
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: 构建并打包 IPA
        script: |
          # 构建 archive
          flutter build ipa --release --no-codesign
          
          # 手动打包 IPA
          mkdir -p Payload
          cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          zip -r build/ios/ipa/HcyPet.ipa Payload/
          rm -rf Payload
          
          echo "✅ IPA 已生成: build/ios/ipa/HcyPet.ipa"
    artifacts:
      - build/ios/ipa/HcyPet.ipa
    publishing:
      email:
        recipients:
          - hkliu178@outlook.com
        notify:
          success: true
          failure: true