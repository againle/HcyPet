workflows:
  ios-build:
    name: iOS Build for SideStore
    environment:
      vars:
        APP_NAME: "HcyPet"
        BUNDLE_ID: "com.hcypet.app"  
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: 设置 Flutter 依赖
        script: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
      - name: 安装 iOS 依赖
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: 构建 iOS IPA
        script: |
          flutter build ipa \
            --release \
            --build-name=1.0.0 \
            --build-number=1 \
            --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - hkliu178@outlook.com  
        notify:
          success: true
          failure: true