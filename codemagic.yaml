workflows:
  ios-build:
    name: iOS Build for SideStore
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: 获取依赖
        script: |
          flutter pub get
      - name: 安装 iOS 依赖
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: 构建并导出 IPA
        script: |
          # 1. Switch to SPM (avoids CocoaPods issues)
          export SWIFT_PACKAGE_MANAGER_INTEGRATION=1
          
          # 2. Flutter 构建 archive
          flutter build ipa --release --no-codesign --export-method development
          
          # 3. 验证产物
          echo "✅ IPA: $(ls -lh build/ios/ipa/*.ipa)"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - hkliu178@outlook.com
        notify:
          success: true
          failure: true