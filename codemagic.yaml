workflows:
  ios-build:
    name: iOS Build for SideStore
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: 获取依赖
        script: |
          flutter pub get
      - name: 安装 iOS 依赖
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: 构建并导出 IPA
        script: |
          # 1. Flutter 构建（生成 Runner.app）
          flutter build ios --release --no-codesign
          
          # 2. 创建 ExportOptions.plist
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>0000000000</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          
          # 3. 使用 xcodebuild 从 .app 生成 .ipa
          mkdir -p build/ios/ipa
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -qry build/ios/ipa/HcyPet.ipa Payload/
          rm -rf Payload
          
          echo "✅ IPA: $(ls -lh build/ios/ipa/HcyPet.ipa)"
    artifacts:
      - build/ios/ipa/HcyPet.ipa
    publishing:
      email:
        recipients:
          - hkliu178@outlook.com
        notify:
          success: true
          failure: true