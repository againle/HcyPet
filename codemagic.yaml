workflows:
  ios-build:
    name: iOS Build for SideStore
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: 获取依赖
        script: |
          flutter pub get
      - name: 安装 iOS 依赖
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: 构建并导出 IPA
        script: |
          # 1. 直接用 flutter build ios（不用 archive）
          flutter build ios --release --no-codesign
          
          # 2. 确认产物存在
          ls -la build/ios/iphoneos/Runner.app
          
          # 3. 手动打包 IPA（标准 Payload 结构，清理隐藏文件）
          mkdir -p build/ios/ipa
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          find Payload -name ".DS_Store" -delete
          ditto -c -k --sequesterRsrc --keepParent Payload build/ios/ipa/HcyPet.ipa
          rm -rf Payload
          
          echo "✅ IPA: $(ls -lh build/ios/ipa/HcyPet.ipa)"
    artifacts:
      - build/ios/ipa/HcyPet.ipa
    publishing:
      email:
        recipients:
          - hkliu178@outlook.com
        notify:
          success: true
          failure: true